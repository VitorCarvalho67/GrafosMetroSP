server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # a visualização 3D é a página inicial do site
    index visualizacao_3d-2.html;

    charset utf-8;
    server_tokens off;

    # não expor os fontes do trabalho acadêmico (LaTeX / Python / infra)
    location ~* \.(tex|sty|bst|bib|py|ya?ml|conf|md|txt|log|sh|env)$ { return 404; }
    location = /Dockerfile { return 404; }
    location ~ /\.          { return 404; }   # dotfiles (.git etc.)

    # figuras, PDFs e estáticos com cache leve
    location ~* \.(pdf|png|jpe?g|gif|svg|ico|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # HTML/JS/JSON sempre revalidados (evita servir versão antiga do cache)
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /visualizacao_3d-2.html;
    }

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 512;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
